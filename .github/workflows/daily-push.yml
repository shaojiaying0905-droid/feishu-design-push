name: 每日推送follow-builders到飞书
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库内容
        uses: actions/checkout@v4
        with:
          repository: zarazhangrui/follow-builders
          fetch-depth: 1

      - name: 读取最新资讯
        id: info
        run: |
          content=$(cat README.md | head -c 1500)
          content="${content//$'\n'/\\n}"
          content="${content//\"/\\\"}"
          echo "content=$content" >> $GITHUB_OUTPUT

      - name: 推送到飞书
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "markdown",
              "content": {
                "title": "AI UIUX日报",
                "text": "AI UIUX日报\n${{ steps.info.outputs.content }}\n\n来源：https://github.com/zarazhangrui/follow-builders"
              }
            }' "$WEBHOOK"

name: 每日推送follow-builders到飞书
on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间每天 9:00 发送
  workflow_dispatch:      # 允许手动测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库内容
        uses: actions/checkout@v4
        with:
          repository: zarazhangrui/follow-builders
          fetch-depth: 1

      - name: 读取最新资讯
        id: info
        run: |
          content=$(cat README.md | head -c 1500)
          # 修正点：正确的换行转义写法是 $'\n'，而非 '/\n/'
          content="${content//$'\n'/\\n}"
          # 修正点：转义双引号只需一次转义
          content="${content//\"/\\\"}"
          echo "content=$content" >> $GITHUB_OUTPUT

      - name: 推送到飞书
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "markdown",
              "content": {
                "title": "📅 每日开发者资讯",
                "text": "${{ steps.info.outputs.content }}\n\n👉 来源：https://github.com/zarazhangrui/follow-builders"
              }
            }' "$WEBHOOK"
          

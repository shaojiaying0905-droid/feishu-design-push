name: 每日推送 follow-builders 到飞书

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: daily-feishu-push
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取资讯源仓库
        uses: actions/checkout@v4
        with:
          repository: zarazhangrui/follow-builders
          fetch-depth: 1

      - name: 检查飞书 Webhook
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK is empty. Please add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: 推送到飞书
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          content="$(head -c 2500 README.md)"

          payload="$(jq -n \
            --arg title "AI UIUX日报" \
            --arg text "AI UIUX日报

${content}

来源：https://github.com/zarazhangrui/follow-builders" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {
                    tag: "plain_text",
                    content: $title
                  }
                },
                elements: [
                  {
                    tag: "markdown",
                    content: $text
                  }
                ]
              }
            }')"

          curl --fail-with-body --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK"
